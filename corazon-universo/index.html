<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corazón Interactivo con Mensaje Especial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div class="title">¿Nos podremos amar?</div>

    <button id="actionBtn" class="hidden">Haz click si te interesó</button>

    <div id="secretMessage" class="hidden-message">
        <p class="text-main">
            Si sigues así me vas a tener que explicar por qué se me olvida todo el mundo cuando hablo contigo...
        </p>
        <p class="text-highlight">
            ¿Tan especial te estás volviendo para mí?
        </p>
        <p class="text-sub">Me lo pregunto todos los días.</p>
        <button id="closeBtn">Volver a ver el corazón</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
